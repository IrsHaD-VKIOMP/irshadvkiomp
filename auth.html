<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auth | irshadvkiomp</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
:root {
  --bg: #050b16;
  --bg-2: #0b1426;
  --panel: rgba(10, 18, 34, 0.84);
  --panel-2: rgba(15, 23, 42, 0.92);
  --line: rgba(148, 163, 184, 0.15);
  --text: #e8eefc;
  --muted: #93a4bf;
  --primary: #5b5ff8;
  --primary-2: #8b5cf6;
  --accent: #ff9b54;
  --shadow-xl: 0 30px 80px rgba(0, 0, 0, 0.55);
  --shadow-lg: 0 20px 44px rgba(0, 0, 0, 0.34);
  --radius-xl: 30px;
  --radius-lg: 20px;
  --radius-md: 14px;
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  min-height: 100%;
}

body {
  min-height: 100vh;
  font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 12% 12%, rgba(91, 95, 248, 0.16), transparent 22%),
    radial-gradient(circle at 82% 14%, rgba(139, 92, 246, 0.14), transparent 22%),
    radial-gradient(circle at 50% 100%, rgba(255, 155, 84, 0.10), transparent 26%),
    linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
  display: grid;
  place-items: center;
  padding: 18px;
  overflow-x: hidden;
}

.bg-orbit,
.bg-grid {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.bg-orbit {
  z-index: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.08), transparent 18%),
    radial-gradient(circle at 80% 22%, rgba(124, 58, 237, 0.12), transparent 22%);
  animation: drift 16s ease-in-out infinite alternate;
}

.bg-grid {
  z-index: 0;
  background-image:
    linear-gradient(rgba(148, 163, 184, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148, 163, 184, 0.05) 1px, transparent 1px);
  background-size: 34px 34px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,0.65), transparent 82%);
  transform: perspective(1200px) rotateX(72deg) translateY(18%);
  transform-origin: top center;
  opacity: 0.35;
}

@keyframes drift {
  from { transform: translate3d(0, 0, 0) scale(1); }
  to { transform: translate3d(16px, -10px, 0) scale(1.05); }
}

.auth-shell {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
}

.auth-card {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius-xl);
  border: 1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(16, 24, 42, 0.96), rgba(4, 10, 22, 0.98));
  box-shadow: var(--shadow-xl);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1);
}

.auth-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 36%);
  pointer-events: none;
}

.auth-card::after {
  content: "";
  position: absolute;
  inset: auto -20% -45% auto;
  width: 240px;
  height: 240px;
  background: radial-gradient(circle, rgba(91, 95, 248, 0.18), transparent 68%);
  pointer-events: none;
}

@keyframes cardIn {
  from {
    opacity: 0;
    transform: translateY(24px) scale(0.97);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.auth-inner {
  position: relative;
  z-index: 1;
  padding: 28px 24px 24px;
}

.top-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid rgba(148, 163, 184, 0.18);
  background: rgba(255,255,255,0.04);
  color: var(--muted);
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 18px;
}

.top-badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6ee7f9, #6366f1);
  box-shadow: 0 0 16px rgba(110, 231, 249, 0.75);
}

h1 {
  margin: 0 0 6px;
  font-size: 2rem;
  line-height: 1.02;
  letter-spacing: -0.03em;
}

.subtext {
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 20px;
}

.mode-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 6px;
  border-radius: 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(148, 163, 184, 0.12);
  margin-bottom: 18px;
}

.mode-tab {
  min-height: 44px;
  border: 0;
  border-radius: 14px;
  background: transparent;
  color: var(--muted);
  font-size: 0.93rem;
  font-weight: 700;
  cursor: pointer;
  transition: 0.24s ease;
}

.mode-tab.active {
  color: #fff;
  background: linear-gradient(135deg, rgba(91,95,248,0.22), rgba(139,92,246,0.18));
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 10px 20px rgba(91,95,248,0.14);
}

.form-stage {
  position: relative;
  min-height: 270px;
}

form {
  position: absolute;
  inset: 0;
  display: grid;
  align-content: start;
  gap: 12px;
  transition:
    opacity 0.42s ease,
    transform 0.42s ease,
    visibility 0.42s ease;
}

form.hidden-left {
  opacity: 0;
  transform: translateX(-28px) scale(0.98);
  pointer-events: none;
  visibility: hidden;
}

form.hidden-right {
  opacity: 0;
  transform: translateX(28px) scale(0.98);
  pointer-events: none;
  visibility: hidden;
}

.input-wrap {
  position: relative;
}

.input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #7dd3fc;
  font-size: 0.98rem;
  pointer-events: none;
}

input {
  width: 100%;
  min-height: 54px;
  padding: 15px 15px 15px 44px;
  border-radius: var(--radius-md);
  border: 1px solid rgba(148, 163, 184, 0.18);
  background: rgba(2, 8, 20, 0.84);
  color: #f8fafc;
  font-size: 0.96rem;
  outline: none;
  transition:
    border-color 0.2s ease,
    box-shadow 0.2s ease,
    transform 0.2s ease,
    background 0.2s ease;
}

input::placeholder {
  color: var(--muted);
}

input:focus {
  border-color: rgba(99, 102, 241, 0.78);
  box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.16);
  transform: translateY(-1px);
  background: rgba(2, 8, 20, 0.96);
}

.meta-row {
  display: flex;
  justify-content: flex-end;
}

.link-btn {
  background: none;
  border: 0;
  color: #c4b5fd;
  cursor: pointer;
  padding: 0;
  font-size: 0.86rem;
  font-weight: 600;
}

.link-btn:hover {
  text-decoration: underline;
}

.primary-btn,
.secondary-btn {
  width: 100%;
  min-height: 52px;
  border-radius: var(--radius-md);
  font-size: 0.97rem;
  font-weight: 800;
  cursor: pointer;
  transition:
    transform 0.18s ease,
    box-shadow 0.18s ease,
    background 0.18s ease,
    border-color 0.18s ease,
    opacity 0.18s ease;
}

.primary-btn {
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  background: linear-gradient(135deg, var(--primary), var(--primary-2) 58%, var(--accent));
  box-shadow: 0 16px 28px rgba(91, 95, 248, 0.34);
}

.primary-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 20px 34px rgba(91, 95, 248, 0.42);
}

.secondary-btn {
  border: 1px solid #334155;
  color: #d5def1;
  background: rgba(255,255,255,0.03);
}

.secondary-btn:hover {
  transform: translateY(-1px);
  background: rgba(255,255,255,0.06);
}

.helper {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid rgba(148,163,184,0.12);
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
}

.loading {
  pointer-events: none;
  opacity: 0.72;
}

#toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  max-width: min(90vw, 340px);
  padding: 13px 16px;
  border-radius: 14px;
  background: rgba(15, 23, 42, 0.96);
  color: #fff;
  border: 1px solid rgba(148,163,184,0.14);
  box-shadow: 0 18px 40px rgba(0,0,0,0.45);
  opacity: 0;
  transform: translateY(18px);
  transition: 0.3s ease;
  z-index: 9999;
}

#toast.show {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 520px) {
  body {
    padding: 12px;
  }

  .auth-inner {
    padding: 22px 16px 18px;
  }

  h1 {
    font-size: 1.7rem;
  }

  .form-stage {
    min-height: 280px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation: none !important;
    transition: none !important;
  }

  form.hidden-left,
  form.hidden-right {
    display: none;
  }
}
</style>
</head>

<body>
<div class="bg-orbit"></div>
<div class="bg-grid"></div>

<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-inner">
      <div class="top-badge">Secure Access</div>

      <h1 id="title">Login</h1>
      <div class="subtext" id="subtitle">Welcome back 👋</div>

      <div class="mode-tabs">
        <button type="button" class="mode-tab active" id="loginTab">Login</button>
        <button type="button" class="mode-tab" id="signupTab">Sign up</button>
      </div>

      <div class="form-stage">
        <form id="loginForm">
          <div class="input-wrap">
            <span class="input-icon">✉</span>
            <input id="loginEmail" type="email" placeholder="Email address" required>
          </div>

          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input id="loginPassword" type="password" placeholder="Password" required>
          </div>

          <div class="meta-row">
            <button type="button" class="link-btn" id="forgotBtn">Forgot password?</button>
          </div>

          <button type="submit" class="primary-btn" id="loginSubmit">Login</button>
        </form>

        <form id="signupForm" class="hidden-right">
          <div class="input-wrap">
            <span class="input-icon">✉</span>
            <input id="signupEmail" type="email" placeholder="Email address" required>
          </div>

          <div class="input-wrap">
            <span class="input-icon">🔐</span>
            <input id="signupPassword" type="password" placeholder="Password (min 6 characters)" required>
          </div>

          <button type="submit" class="primary-btn" id="signupSubmit">Create account</button>
          <button type="button" class="secondary-btn" id="resendBtn">Resend verification email</button>
        </form>
      </div>

      <div class="helper">
        Check Your Spam Mail If you dont get mail
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendEmailVerification,
  sendPasswordResetEmail,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDr3YpouSddKSR-9PqKPHDSP1qfwNv-VBM",
  authDomain: "irshad-website.firebaseapp.com",
  projectId: "irshad-website",
  appId: "1:513828028182:web:ceca5d1ac390d5ec731a37"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");
const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");
const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");
const resendBtn = document.getElementById("resendBtn");
const forgotBtn = document.getElementById("forgotBtn");
const loginSubmit = document.getElementById("loginSubmit");
const signupSubmit = document.getElementById("signupSubmit");

const toastEl = document.getElementById("toast");
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(() => toastEl.classList.remove("show"), 3200);
}

function setButtonLoading(btn, state, text) {
  if (!btn) return;
  btn.disabled = state;
  btn.classList.toggle("loading", state);
  btn.textContent = state ? "Please wait..." : text;
}

let isLoginMode = true;

function updateTabs() {
  loginTab.classList.toggle("active", isLoginMode);
  signupTab.classList.toggle("active", !isLoginMode);
}

function updateMode(nextLoginMode) {
  isLoginMode = nextLoginMode;
  updateTabs();

  if (isLoginMode) {
    loginForm.classList.remove("hidden-left", "hidden-right");
    signupForm.classList.add("hidden-right");
    title.textContent = "Login";
    subtitle.textContent = "Welcome back 👋";
  } else {
    signupForm.classList.remove("hidden-left", "hidden-right");
    loginForm.classList.add("hidden-left");
    title.textContent = "Create account";
    subtitle.textContent = "Create your account and verify your email ✨";
  }
}

loginTab.addEventListener("click", () => updateMode(true));

signupTab.addEventListener("click", async () => {
  if (auth.currentUser) {
    await signOut(auth);
  }
  updateMode(false);
});

loginForm.addEventListener("submit", async e => {
  e.preventDefault();
  setButtonLoading(loginSubmit, true, "Login");

  try {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    const user = await signInWithEmailAndPassword(auth, email, password);

    if (!user.user.emailVerified) {
      toast("Verify your email first 📩");
      await signOut(auth);
      setButtonLoading(loginSubmit, false, "Login");
      return;
    }

    toast("Login successful ✅");
    setTimeout(() => {
      location.href = "links.html";
    }, 1200);
  } catch (err) {
    toast(err.message);
    setButtonLoading(loginSubmit, false, "Login");
  }
});

signupForm.addEventListener("submit", async e => {
  e.preventDefault();
  setButtonLoading(signupSubmit, true, "Create account");

  try {
    const email = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value;

    const user = await createUserWithEmailAndPassword(auth, email, password);
    await sendEmailVerification(user.user);
    toast("Verification email sent 📩 Check your inbox");
  } catch (err) {
    toast(err.message);
  }

  setButtonLoading(signupSubmit, false, "Create account");
});

resendBtn.addEventListener("click", async () => {
  try {
    const user = auth.currentUser;

    if (!user) {
      toast("Sign up again to resend verification");
      return;
    }

    if (user.emailVerified) {
      toast("Email already verified ✅");
      return;
    }

    await sendEmailVerification(user);
    toast("Verification email re-sent 📩 Check inbox/spam");
  } catch (err) {
    toast(err.message);
  }
});

forgotBtn.addEventListener("click", async () => {
  const loginEmail = document.getElementById("loginEmail").value.trim();

  if (!loginEmail) {
    toast("Enter your email first");
    return;
  }

  try {
    await sendPasswordResetEmail(auth, loginEmail);
    toast("Password reset email sent 🔐");
  } catch (err) {
    toast(err.message);
  }
});
</script>
</body>
</html>
